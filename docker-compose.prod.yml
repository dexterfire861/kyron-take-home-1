services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      AWS_SSM_PREFIX: ${AWS_SSM_PREFIX}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_POOL_MAX_OVERFLOW: ${DB_POOL_MAX_OVERFLOW:-10}
    ports:
      - "127.0.0.1:5001:5001"
