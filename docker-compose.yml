services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kyron
      POSTGRES_PASSWORD: kyron
      POSTGRES_DB: kyron
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyron -d kyron"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
