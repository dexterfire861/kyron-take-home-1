# Reverse proxy + static frontend host for the Kyron app.
# HTTPS is added in-place by `certbot --nginx` during provisioning — this
# file only needs the HTTP server block; certbot appends the ssl_certificate
# directives and the 80->443 redirect automatically.
server {
    listen 80;
    server_name __DOMAIN__;

    root /var/www/kyron/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # server-sent events (note generation stream) must not be buffered
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri /index.html;
    }
}
