# Interim config for demoing over plain HTTP via the EC2 public IP, before a
# domain is set up. Once a domain exists, switch to deploy/nginx.conf and run
# `certbot --nginx` per deploy/deploy.sh instead of this file.
server {
    listen 80 default_server;
    server_name _;

    root /var/www/kyron/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri /index.html;
    }
}
